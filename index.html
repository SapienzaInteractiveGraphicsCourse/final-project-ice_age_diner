<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Age Diner - Final Project</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="ui-top-left" class="ui-panel">
        <label>⏰ Working Time</label>
        
        <div class="slider-wrapper">
            <div class="slider-track-visual">
                <div class="track-segment giorno-seg"></div>
                <div class="track-segment tramonto-seg"></div>
                <div class="track-segment notte-seg"></div>
            </div>
            <input type="range" id="time-slider" min="0" max="100" value="0" step="1">
        </div>

        <div class="slider-labels">
            <span class="label-item">☀️<br><small>Day</small></span>
            <span class="label-item">🌅<br><small>Sunset</small></span>
            <span class="label-item">🌙<br><small>Night</small></span>
        </div>
    </div>

    <div id="ui-top-right" class="ui-panel">
        <div class="stars-container">
            <span class="star" data-value="1">☆</span>
            <span class="star" data-value="2">☆</span>
            <span class="star" data-value="3">☆</span>
            <span class="star" data-value="4">☆</span>
            <span class="star" data-value="5">☆</span>
        </div>
        <div id="earnings-counter">💰 Cash: $ 00.00</div>
    </div>

    <div id="ui-side-right" class="ui-panel">
        <h3>💡 Luci Tavoli (clicca più volte)</h3>
        <button id="btn-faretto-1" class="game-btn">Faretto 1</button>
        <button id="btn-faretto-2" class="game-btn">Faretto 2</button>
        <button id="btn-faretto-3" class="game-btn">Faretto 3</button>
    </div>

    <script src="js/ristorante.js"></script>
    <script src="js/arredi.js"></script> 
    <script src="js/penguin.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
